<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Speedtest</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117; 
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        .speedometer-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gauge-background {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 20px solid #30363d; 
            box-sizing: border-box;
            clip-path: polygon(0% 100%, 0% 0%, 100% 0%, 100% 100%, 50% 60%);
        }

        .gauge-progress {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 20px solid transparent;
            box-sizing: border-box;
            border-image: linear-gradient(to right, #00ff88, #00e5ff) 1;
            clip-path: polygon(0% 100%, 0% 0%, 50% 0%, 50% 50%, 0% 100%); 
            transform: rotate(-90deg);
            transition: clip-path 0.5s ease-out;
        }

        .gauge-center {
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: #161b22;
            border-radius: 50%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .speed-value {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0,255,136,0.5);
        }

        .speed-unit {
            font-size: 18px;
            color: #ff4444;
            font-weight: bold;
        }

        .info-text {
            margin-top: 30px;
            font-size: 16px;
            color: #8b949e;
        }

        .action-button {
            margin-top: 20px;
            background: linear-gradient(to right, #00ff88, #00e5ff);
            border: none;
            padding: 12px 24px;
            color: #0d1117;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,255,136,0.3);
            transition: transform 0.1s;
        }

        .action-button:active {
            transform: scale(0.95);
        }

    </style>
</head>
<body>

<div class="speedometer-container">
    <div class="gauge-background"></div>
    <div class="gauge-progress" id="progressGauge"></div>

    <div class="gauge-center">
        <div class="speed-value" id="speedValue">0.00</div>
        <div class="speed-unit">Mb/s</div>
    </div>
</div>

<div class="info-text">Вимірювання швидкості вашого підключення</div>
<button class="action-button" id="startBtn" onclick="startTest()">ПОЧАТИ ТЕСТ</button>

<script>
    const webApp = window.Telegram.WebApp;
    webApp.expand();
    const progressGauge = document.getElementById('progressGauge');
    const speedValue = document.getElementById('speedValue');
    const startBtn = document.getElementById('startBtn');

    function updateGauge(value, maxValue = 100) {
        let percentage = (value / maxValue) * 100;
        if (percentage > 100) percentage = 100;

        let clipValue = 100 - percentage;
        progressGauge.style.clipPath = `polygon(0% 100%, 0% 0%, ${percentage}% 0%, ${percentage}% ${clipValue}%, 0% 100%)`;

        speedValue.innerText = value.toFixed(2);
    }

    function startTest() {
        startBtn.disabled = true;
        startBtn.innerText = "ЗАМІР...";
        let currentSpeed = 0;


        let interval = setInterval(() => {
            currentSpeed += Math.random() * 5;
            if (currentSpeed >= 20.26) {
                currentSpeed = 20.26;
                clearInterval(interval);
                startBtn.innerText = "ТЕСТ ЗАВЕРШЕНО";
            }
            updateGauge(currentSpeed);
        }, 100);
    }

</script>
</body>
</html>
