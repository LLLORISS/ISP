<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISP Speedtest Real</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0d1117;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .speedometer {
            position: relative;
            width: 300px;
            height: 300px;
        }
        svg {
            transform: rotate(135deg);
        }
        .base-circle {
            fill: none;
            stroke: #30363d;
            stroke-width: 20;
            stroke-dasharray: 471;
            stroke-dashoffset: 118;
            stroke-linecap: round;
        }
        .progress-circle {
            fill: none;
            stroke: url(#gradient);
            stroke-width: 20;
            stroke-dasharray: 471;
            stroke-dashoffset: 471;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }
        .center-data {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        .speed-value {
            font-size: 64px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            line-height: 1;
        }
        .speed-unit {
            font-size: 20px;
            color: #ff4444;
            font-weight: bold;
            margin-top: 5px;
        }
        .btn {
            margin-top: 25px;
            background: linear-gradient(90deg, #00ff88, #00e5ff);
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            color: #0d1117;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }
        .btn:disabled {
            background: #30363d;
            color: #8b949e;
            cursor: not-allowed;
        }
        .info {
            margin-top: 40px;
            color: #8b949e;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="speedometer">
    <svg width="300" height="300" viewBox="0 0 200 200">
        <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#00ff88" />
                <stop offset="100%" stop-color="#00e5ff" />
            </linearGradient>
        </defs>
        <circle class="base-circle" cx="100" cy="100" r="75" />
        <circle id="progress" class="progress-circle" cx="100" cy="100" r="75" />
    </svg>

    <div class="center-data">
        <div id="speedText" class="speed-value">0.00</div>
        <div class="speed-unit">Mb/s</div>
    </div>
</div>

<div class="info">Вимірювання швидкості вашого підключення</div>
<button id="startBtn" class="btn" onclick="startRealTest()">ПОЧАТИ ТЕСТ</button>

<script>
    const webApp = window.Telegram.WebApp;
    webApp.expand();

    const progressCircle = document.getElementById('progress');
    const speedText = document.getElementById('speedText');
    const startBtn = document.getElementById('startBtn');

    const maxDashOffset = 353;

    function updateUI(mbps) {
        let displayMbps = Math.min(mbps, 100);
        const offset = 471 - (displayMbps / 100) * maxDashOffset;
        progressCircle.style.strokeDashoffset = offset;
        speedText.innerText = mbps.toFixed(2);
    }

    async function startRealTest() {
        startBtn.disabled = true;
        startBtn.innerText = "ВИМІРЮВАННЯ...";

        const testFileUrl = "/TestSpeed.rar?nocache=" + Date.now();

        try {
            const startTime = performance.now();
            const response = await fetch(testFileUrl);
            const reader = response.body.getReader();

            let loaded = 0;
            while(true) {
                const {done, value} = await reader.read();
                if (done) break;
                loaded += value.length;

                const duration = (performance.now() - startTime) / 1000;
                if (duration > 0) {
                    const bps = (loaded * 8) / duration;
                    const mbps = bps / (1024 * 1024);
                    updateUI(mbps);
                }
            }
        } catch (e) {
            speedText.innerText = "ERR";
        } finally {
            startBtn.innerText = "ТЕСТ ЗАВЕРШЕНО";
        }
    }
</script>
</body>
</html>
